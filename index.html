<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Unsent</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-image: url("01.JPG"); 
            background-size: cover;      
            background-position: center;  
            background-repeat: no-repeat; 
            height: 100vh;
            display: flex;
            justify-content: center;
            border: 4px solid #6495ED; 
        }
        .container {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;     
            margin-top: 8vh; 
            padding-top: 60px;      
            padding-bottom: 100px;   
            width: 100%;
        }
        .main-title {
            color: white;            
            font-size: 4rem;         
        }
        .nav-links {
            position: relative !important;
            top: 200px !important;    
            display: flex !important;  
            flex-direction: row !important; 
            align-items: center !important; 
            justify-content: center !important;
            gap: 70px;                
        }
        
        /* 1. 基礎文字樣式 */
        .link-item {
            color: #000000;          /* 修改預設顏色為黑色（如你示意圖） */
            text-decoration: none;   
            font-size: 1.5rem;       /* 微調大一點比較好點擊 */
            font-weight: bold;
            transition: color 0.2s ease-in-out; /* 關鍵：滑動變色的平滑動畫 */
        }

        /* 2. 滑鼠懸停 (Hover) 變色效果 */
        .link-item:hover {
            color: #6495ED;          /* 這裡改成你想要的懸停顏色，目前設定成跟邊框一樣的藍色 */
        }

        /* 3. 分隔線顏色 */
        .divider {
            width: 1px;
            height: 25px;
            background-color: #000000; /* 修改為黑色（如你示意圖） */
        }
    </style>
</head>
<body>

    <div class="container">
        <h1 class="main-title">Unsent</h1>

        <div class="nav-links">
            <a href="personal.html" class="link-item">個人報告</a>
            <div class="divider"></div>
            <a href="team.html" class="link-item">團隊專題</a>
        </div>
    </div>

</body>
</html>
