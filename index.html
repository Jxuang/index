<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Unsent</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-image: url("01.JPG"); 
            background-size: cover;      
            background-position: center;  
            background-repeat: no-repeat; 
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center; /* 讓整體內容在螢幕上完美上下置中 */
            border: 4px solid #6495ED; 
        }
        .container {
            width: 100%;
            display: flex;
            justify-content: center;
        }
        .nav-links {
            display: flex;  
            flex-direction: row; 
            align-items: center; 
            justify-content: center;
            gap: 150px; /* 調整文字與中間分隔線的左右間距，使其像圖片一樣開闊 */
        }
        
        /* 1. 基礎文字樣式 */
        .link-item {
            color: #000000;          /* 預設為黑色（如圖所示） */
            text-decoration: none;   
            font-size: 2rem;         /* 放大字體大小 */
            font-weight: normal;     /* 維持一般粗細 */
            transition: color 0.2s ease-in-out; /* 滑動變色的平滑動畫 */
        }

        /* 2. 滑鼠懸停 (Hover) 變色效果 */
        .link-item:hover {
            color: #6495ED;          /* 懸停時變色（目前設定為跟邊框一樣的藍色，你可以自己改） */
        }

        /* 3. 分隔線樣式 */
        .divider {
            width: 2px;              /* 線條粗細 */
            height: 100px;           /* 線條高度（如圖中較高的黑線） */
            background-color: #000000; /* 分隔線為黑色 */
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="nav-links">
            <a href="personal.html" class="link-item">個人報告</a>
            <div class="divider"></div>
            <a href="team.html" class="link-item">團隊專題</a>
        </div>
    </div>

</body>
</html>
