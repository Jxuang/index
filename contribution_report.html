<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>《UnSENT》個人貢獻報告書</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #FFFDE0; /* 延用你的淡黃色背景 */
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        /* PDF 容器樣式 */
        .pdf-container {
            width: 95%;
            height: 92vh;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            border-radius: 8px;
            overflow: hidden;
        }
        object, embed {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <div class="pdf-container">
        <object data="contribution_report.pdf" type="application/pdf">
            <embed src="contribution_report.pdf" type="application/pdf" />
        </object>
    </div>

</body>
</html>
