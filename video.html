<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>影片宣傳</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #FFFDE0; /* 維持與其他頁面相同的淡黃色背景 */
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center; /* 水平置中 */
            align-items: center;     /* 垂直置中 */
            overflow: hidden;
        }
        
        /* 影片容器：限制最大寬度並加上陰影 */
        .video-container {
            width: 80%;
            max-width: 900px;
            aspect-ratio: 16 / 9; /* 🛠️ 自動維持 16:9 的影片比例 */
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            border-radius: 12px;
            overflow: hidden; /* 確保影片圓角完美裁切 */
        }

        .video-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <div class="video-container">
        <iframe width="560" height="315" src="https://www.youtube.com/embed/JYdwLHwjLMs?si=a0Jfq9Z4wxCq5J2W" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
    </div>

</body>
</html>
